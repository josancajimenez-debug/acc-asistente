<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0B1D3A;--blue:#1A5276;--accent:#2E86C1;--gold:#D4A843;--light:#F0F4F8;--white:#FFFFFF;--g100:#E8ECF1;--g300:#B0BEC5;--g500:#607D8B;--g700:#37474F;--ok:#27AE60}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;background:linear-gradient(160deg,var(--light) 0%,#E3EDF5 50%,var(--g100) 100%);overflow:hidden}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes bn{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

/* HEADER */
.header{background:linear-gradient(135deg,var(--navy),var(--blue));padding:16px 20px;display:flex;align-items:center;gap:14;box-shadow:0 4px 20px rgba(11,29,58,.3);z-index:10;flex-shrink:0}
.logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--gold),#C4963A);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--navy);letter-spacing:-.5px;box-shadow:0 3px 12px rgba(212,168,67,.4)}
.header-text h1{color:var(--white);font-size:17px;font-weight:700;letter-spacing:-.3px}
.header-text span{color:var(--gold);font-size:11px;font-weight:500;letter-spacing:.5px}
.status{margin-left:auto;display:flex;align-items:center;gap:6}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pu 2s ease infinite}
.status span{color:var(--g300);font-size:11px}

/* CHAT AREA */
.chat{flex:1;overflow-y:auto;padding:20px 16px}
.chat::-webkit-scrollbar{width:5px}
.chat::-webkit-scrollbar-thumb{background:var(--g300);border-radius:10px}

/* WELCOME */
.welcome{animation:su .5s ease}
.welcome-card{background:var(--white);border-radius:18px;padding:24px 20px;margin-bottom:20px;box-shadow:0 4px 16px rgba(0,0,0,.06);text-align:center}
.welcome-card .wave{font-size:36px;margin-bottom:8px}
.welcome-card h2{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:6px}
.welcome-card p{font-size:13px;color:var(--g500);line-height:1.6;max-width:420px;margin:0 auto}
.info-tags{margin-top:14px;display:flex;flex-direction:column;align-items:center;gap:6}
.tag{padding:6px 14px;background:var(--light);border-radius:10px;font-size:12px;color:var(--blue)}
.contact-box{padding:8px 14px;background:var(--white);border-radius:10px;border:1px solid var(--g100);display:flex;flex-direction:column;gap:2;align-items:center;font-size:12px;color:var(--g700)}
.contact-box strong{font-weight:700}

/* SERVICE CARDS */
.section-label{font-size:11px;font-weight:600;color:var(--g500);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.services-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.scard{background:var(--white);border:1.5px solid var(--g100);border-radius:14px;padding:16px 14px;cursor:pointer;transition:all .25s}
.scard:hover{background:var(--light);border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(46,134,193,.15)}
.scard .icon{font-size:28px;margin-bottom:8px}
.scard h3{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:4px;line-height:1.3}
.scard p{font-size:11px;color:var(--g500);line-height:1.4}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--white);color:var(--blue);border:1px solid var(--g300);border-radius:20px;padding:7px 14px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.chip:hover{background:var(--accent);color:var(--white);border-color:var(--accent)}

/* MESSAGES */
.msg-row{display:flex;margin-bottom:12px;animation:fi .3s ease}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{justify-content:flex-start}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--white);font-weight:700;flex-shrink:0;margin-right:8px;margin-top:4px}
.bubble{max-width:80%;padding:12px 16px;font-size:13.5px;word-break:break-word;line-height:1.7}
.bubble.user{border-radius:18px 18px 4px 18px;background:linear-gradient(135deg,var(--blue),var(--accent));color:var(--white)}
.bubble.bot{border-radius:18px 18px 18px 4px;background:var(--white);color:var(--g700);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.bubble.bot strong{color:var(--blue)}

/* TYPING */
.typing-dots{display:flex;gap:4px;padding:8px 0}
.typing-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);display:block}
.typing-dots span:nth-child(1){animation:bn 1.2s ease-in-out 0s infinite}
.typing-dots span:nth-child(2){animation:bn 1.2s ease-in-out .2s infinite}
.typing-dots span:nth-child(3){animation:bn 1.2s ease-in-out .4s infinite}

/* INPUT */
.input-area{padding:12px 16px 16px;background:var(--white);border-top:1px solid var(--g100);box-shadow:0 -2px 12px rgba(0,0,0,.04);flex-shrink:0}
.input-row{display:flex;align-items:center;gap:10px;background:var(--light);border-radius:14px;padding:4px 6px 4px 16px;border:1.5px solid var(--g100)}
.input-row input{flex:1;border:none;outline:none;background:transparent;font-size:14px;color:var(--g700);padding:10px 0;font-family:inherit}
.input-row input::placeholder{color:var(--g300)}
.send-btn{width:42px;height:42px;border-radius:12px;border:none;background:var(--g100);color:var(--g300);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:default;transition:all .2s;flex-shrink:0}
.send-btn.active{background:linear-gradient(135deg,var(--blue),var(--accent));color:var(--white);cursor:pointer}
.footer-text{text-align:center;margin-top:8px;font-size:10px;color:var(--g300)}

/* FLOATING WHATSAPP BUTTON */
.wa-float{position:fixed;bottom:85px;right:18px;width:56px;height:56px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,211,102,0.5);cursor:pointer;z-index:100;transition:transform 0.3s ease;text-decoration:none}
.wa-float:hover{transform:scale(1.1)}
.wa-float svg{width:30px;height:30px;fill:white}
.wa-float-label{position:fixed;bottom:93px;right:82px;background:#25D366;color:white;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.15);z-index:100;animation:fi 0.5s ease;white-space:nowrap}
@keyframes pulse-wa{0%,100%{box-shadow:0 4px 16px rgba(37,211,102,0.5)}50%{box-shadow:0 4px 24px rgba(37,211,102,0.8)}}

/* WA BUTTON IN CHAT */
.wa-chat-btn{display:inline-block;background:#25D366;color:white;padding:10px 18px;border-radius:22px;text-decoration:none;font-weight:700;font-size:12px;margin:6px 0;box-shadow:0 3px 10px rgba(37,211,102,0.35);cursor:pointer;transition:all 0.2s}
.wa-chat-btn:hover{background:#1EBE5A;transform:translateY(-1px)}
</style>

  let summary = "📋 *Solicitud desde Asistente Virtual ACC.CONTADORES*\n\n";

  summary += "Conversación del cliente:\n";

function detectIntent(text) {
  const t = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const orig = text.toLowerCase();

  // PRIORIDAD 1: Si el bot ya pidió datos de cita o cotización,
  // todo lo que escriba el cliente se trata como datos (no como otra consulta)
  if (lastIntent && (lastIntent === "appointment" || lastIntent === "quote")) {
    // Solo salir del modo datos si el cliente dice explícitamente algo como "no" o "cancelar"
    const cancelWords = ["no","cancelar","no quiero","mejor no","dejalo","déjalo","olvidalo","olvídalo"];
    const isCancel = cancelWords.some(w => orig.includes(w)) && text.length < 30;
    if (!isCancel) {
      const r = lastIntent === "appointment" ? KB.cita_datos : KB.cotizacion_datos;
      lastIntent = null;
      return { id: "data", resp: () => r };
    } else {
      lastIntent = null;
      return { id: "cancel", resp: () => "Entendido, no hay problema. ¿En qué más puedo ayudarle?" };
    }
  }

  // PRIORIDAD 2: Detección normal de intención por palabras clave
  let best = null, bestScore = 0;
  for (const intent of INTENTS) {
    let score = 0;
    for (const kw of intent.kw) {
      const kwN = kw.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      if (t.includes(kwN) || orig.includes(kw)) score += kw.split(" ").length * 2 + kw.length * 0.1;
    }
    if (score > bestScore) { bestScore = score; best = intent; }
  }
  if (best && (best.id === "appointment" || best.id === "quote")) lastIntent = best.id;
  else lastIntent = null;
  return best || { id: "fallback", resp: () => KB.fallback[Math.floor(Math.random() * KB.fallback.length)] };
}

}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function showQuickActions() {
  const actions = `<div style="margin-top:8px;margin-bottom:4px;animation:fi .4s ease">
    <a class="wa-chat-btn" onclick="openWhatsApp('consulta')">📱 Enviar consulta por WhatsApp</a>
  </div>
  <div class="chips" style="margin-top:6px;margin-bottom:8px;animation:fi .4s ease">
    <button class="chip" onclick="sendQuick('Quiero agendar una cita')">Agendar cita</button>
    <button class="chip" onclick="sendQuick('Solicitar cotización')">Solicitar cotización</button>
    <button class="chip" onclick="sendQuick('¿Qué servicios ofrecen?')">Ver servicios</button>
    <button class="chip" onclick="sendQuick('¿Cómo los contacto?')">Contacto directo</button>
  </div>`;
  chat.innerHTML += actions;
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}

function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;
  if (!started) { chat.innerHTML = ""; started = true; }
  addMessage("user", text);
  conversationLog.push({ role: "user", text: text });
  userInput.value = "";
  sendBtn.classList.remove("active");
  messageCount++;

  const typingId = showTyping();
  const intent = detectIntent(text);
  const delay = 500 + Math.random() * 700;

  setTimeout(() => {
    removeTyping(typingId);

    // Si ya pasó el límite de mensajes gratuitos, bloquear y pedir WhatsApp
    if (messageCount > FREE_MESSAGES) {
      const lockMsg = "😊 ¡Gracias por su interés!<br><br>Para brindarle una <strong>atención personalizada</strong> y responder su consulta en detalle, por favor contáctenos directamente por WhatsApp. Nuestro equipo profesional le atenderá de inmediato.<br><br>Al tocar el botón, se enviará un resumen de toda su conversación para que no tenga que repetir nada.<br><br><a class='wa-chat-btn' onclick=\"openWhatsApp('consulta')\" style='display:inline-block;background:#25D366;color:white;padding:14px 28px;border-radius:25px;text-decoration:none;font-weight:700;font-size:15px;margin:10px 0;box-shadow:0 4px 16px rgba(37,211,102,0.5);cursor:pointer'>📱 Continuar por WhatsApp</a><br><br><small style='color:var(--g500)'>Toque el botón verde y luego presione Enviar en WhatsApp.</small>";
      addMessage("bot", lockMsg);
      conversationLog.push({ role: "bot", text: "Solicitud de continuar por WhatsApp" });
      // Deshabilitar input
      userInput.disabled = true;
      userInput.placeholder = "Para continuar, toque el botón verde de WhatsApp ☝️";
      sendBtn.style.display = "none";
      chat.scrollTop = chat.scrollHeight;
      return;
    }

    let response = intent.resp();
    // Process WhatsApp buttons if present
    if (response.includes("WHATSAPP_CITA_BTN")) {
      response = addWhatsAppButton(response, "cita");
    }
    if (response.includes("WHATSAPP_COTIZACION_BTN")) {
      response = addWhatsAppButton(response, "cotizacion");
    }
    addMessage("bot", response);
    conversationLog.push({ role: "bot", text: response.replace(/<[^>]*>/g, '') });
    showQuickActions();
    userInput.focus();
  }, delay);
}

function openWhatsApp(type) {
  const url = buildWhatsAppURL(type);
  window.open(url, "_blank");
}

function sendQuick(text) {
  userInput.value = text;
  sendMessage();
}

function resetChat() {
  started = false;
  lastIntent = null;
  conversationLog = [];
  messageCount = 0;
  userInput.disabled = false;
  userInput.placeholder = "Escriba su consulta aquí...";
  sendBtn.style.display = "flex";
  showWelcome();
  userInput.focus();
}

// Init
showWelcome();
userInput.focus();

// Hide floating label after 5 seconds
setTimeout(() => {
  const label = document.getElementById("waLabel");
  if (label) label.style.display = "none";
}, 5000);
</script>
</body>
</html>
